[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers customizados — categorizam cada teste por tipo.
# Uso: pytest -m unit | -m integration | -m fallback | etc.
markers =
    unit: testes unitários puros (funções/métodos isolados, sem I/O)
    integration: testes de integração (múltiplas unidades reais juntas)
    system: testes de sistema / end-to-end (fronteira HTTP, fluxos completos)
    regression: testes que cobrem bugs conhecidos já corrigidos
    fallback: testes de caminhos alternativos quando o primário falha
    pipeline: testes de ordem e composição de chamadas internas (interaction testing)
    part1: pertence à Parte 1 do trabalho (application + infrastructure)
    part2: pertence à Parte 2 do trabalho (interfaces/http)

# Configurações de output
addopts =
    -v
    --tb=short
    --strict-markers
